<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Emplacement image silo informatique : dashboard monitoring DCB. A remplacer par photo reelle en v2.0.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B3D91"/>
      <stop offset="55%" stop-color="#072B6B"/>
      <stop offset="100%" stop-color="#051C4F"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(239,68,68,0.2)"/>
      <stop offset="100%" stop-color="rgba(239,68,68,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#grid)"/>
  <rect width="600" height="450" fill="url(#glow)"/>

  <!-- Dashboard window mockup -->
  <g transform="translate(80 60)">
    <rect x="0" y="0" width="440" height="300" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="440" height="34" rx="14" fill="rgba(255,255,255,0.05)"/>
    <rect x="0" y="20" width="440" height="14" fill="rgba(255,255,255,0.05)"/>
    <circle cx="20" cy="17" r="5" fill="#EF4444"/>
    <circle cx="40" cy="17" r="5" fill="#F59E0B"/>
    <circle cx="60" cy="17" r="5" fill="#10B981"/>
    <text x="220" y="21" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">DCB monitoring · 4 departements</text>

    <!-- Status grid -->
    <g transform="translate(22 58)">
      <!-- Online -->
      <rect x="0" y="0" width="124" height="64" rx="8" fill="rgba(16,185,129,0.14)" stroke="rgba(16,185,129,0.3)"/>
      <circle cx="16" cy="16" r="4" fill="#10B981"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="28" y="20" font-family="'Sora',sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.75)">ONLINE</text>
      <text x="16" y="46" font-family="'Sora',sans-serif" font-size="22" font-weight="700" fill="white">99.9%</text>
      <text x="16" y="58" font-family="'Sora',sans-serif" font-size="8" letter-spacing="1" fill="rgba(255,255,255,0.45)">UPTIME</text>

      <!-- CPU -->
      <rect x="136" y="0" width="124" height="64" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="152" cy="16" r="4" fill="#10B981"/>
      <text x="164" y="20" font-family="'Sora',sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.75)">CPU</text>
      <text x="152" y="46" font-family="'Sora',sans-serif" font-size="22" font-weight="700" fill="white">34%</text>
      <text x="152" y="58" font-family="'Sora',sans-serif" font-size="8" letter-spacing="1" fill="rgba(255,255,255,0.45)">USAGE</text>

      <!-- Alert -->
      <rect x="272" y="0" width="124" height="64" rx="8" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.4)"/>
      <circle cx="288" cy="16" r="4" fill="#EF4444"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle>
      <text x="300" y="20" font-family="'Sora',sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.8)">ALERT</text>
      <text x="288" y="46" font-family="'Sora',sans-serif" font-size="22" font-weight="700" fill="white">1</text>
      <text x="288" y="58" font-family="'Sora',sans-serif" font-size="8" letter-spacing="1" fill="rgba(255,255,255,0.55)">INTERVENTION</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(22 138)">
      <rect x="0" y="0" width="396" height="140" rx="8" fill="rgba(255,255,255,0.04)"/>
      <text x="12" y="18" font-family="'Sora',sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.55)">TEMPS INTERVENTION / MOIS</text>
      <text x="384" y="18" text-anchor="end" font-family="'Sora',sans-serif" font-size="9" font-weight="700" fill="#EF4444">&lt; 4h</text>
      <!-- Baseline SLA -->
      <line x1="12" y1="70" x2="384" y2="70" stroke="rgba(255,255,255,0.15)" stroke-dasharray="3 3"/>
      <text x="16" y="66" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.35)">SLA 4h</text>
      <!-- Bars -->
      <g fill="#EF4444">
        <rect x="30"  y="90" width="14" height="30" rx="2" opacity="0.9"/>
        <rect x="62"  y="82" width="14" height="38" rx="2" opacity="0.9"/>
        <rect x="94"  y="98" width="14" height="22" rx="2" opacity="0.9"/>
        <rect x="126" y="76" width="14" height="44" rx="2" opacity="0.9"/>
        <rect x="158" y="88" width="14" height="32" rx="2" opacity="0.9"/>
        <rect x="190" y="94" width="14" height="26" rx="2" opacity="0.9"/>
        <rect x="222" y="80" width="14" height="40" rx="2" opacity="0.9"/>
        <rect x="254" y="86" width="14" height="34" rx="2" opacity="0.9"/>
        <rect x="286" y="100" width="14" height="20" rx="2" opacity="0.9"/>
        <rect x="318" y="92" width="14" height="28" rx="2" opacity="0.9"/>
        <rect x="350" y="84" width="14" height="36" rx="2" opacity="0.9"/>
      </g>
      <!-- Trend line -->
      <polyline points="37,105 69,101 101,109 133,98 165,104 197,107 229,100 261,103 293,110 325,106 357,102"
                fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    </g>
  </g>

  <!-- Label footer -->
  <g transform="translate(300 410)" text-anchor="middle" font-family="'Sora',sans-serif">
    <text font-size="11" font-weight="700" letter-spacing="3.5" fill="rgba(255,255,255,0.45)">EMPLACEMENT IMAGE · SILO INFORMATIQUE</text>
    <text y="16" font-size="10" letter-spacing="1" fill="rgba(255,255,255,0.3)">photo client, dashboard r&#233;el ou infographie (v2.0)</text>
  </g>
</svg>
